plugins {
    id 'com.android.application'
}

android {
    namespace 'com.httrack.android'
    compileSdk 35
    // Pinned to what the toolchain image installs, so no build-tools are fetched at build time.
    buildToolsVersion "35.0.0"
    ndkVersion "26.3.11579264"

    defaultConfig {
        applicationId "com.httrack.android"
        minSdk 24
        // targetSdk stays at 28 to keep legacy storage: the crawl is still File-based.
        // Bumping it to 35 is Phase 4, together with the scoped-storage rework.
        targetSdk 28
        versionCode 63
        versionName "3.49.02.63"

        ndk {
            abiFilters "arm64-v8a", "x86_64"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }

    buildFeatures {
        // HTTrackActivity reads BuildConfig.APPLICATION_ID for the FileProvider authority.
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    // This 2017-era code trips many modern checks; keep the build green and tighten later.
    lint {
        abortOnError false
    }

    externalNativeBuild {
        ndkBuild {
            path 'src/main/jni/Android.mk'
        }
    }
}

dependencies {
    // AndroidX drags in kotlin-stdlib 1.8.22 but leaves the jdk7/jdk8 shims at the 1.6.21
    // coroutines asks for; 1.8.22 folded those classes into stdlib, so the stale shims
    // collide with it. The BOM aligns every Kotlin artifact on 1.8.22, emptying the shims.
    implementation platform('org.jetbrains.kotlin:kotlin-bom:1.8.22')

    implementation 'androidx.core:core:1.13.1'
    implementation 'androidx.fragment:fragment:1.8.2'
}
